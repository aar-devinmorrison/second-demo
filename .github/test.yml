name: Test Project
on: push
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout
      - name: install NodeJS
        uses: actions/setup-node
        with:
          node-version: '18'
      - name: Install Dependencies
        run: npm ci 
      - name: Run Tests
        run: npm test
